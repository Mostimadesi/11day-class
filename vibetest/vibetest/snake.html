<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏 - 增强版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #4ecca3;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .score-board {
            color: #fff;
            font-size: 1.2em;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .score, .high-score {
            color: #4ecca3;
            font-weight: bold;
            font-size: 1.5em;
        }

        .high-score {
            color: #ffd700;
        }

        canvas {
            border: 3px solid #4ecca3;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(78, 204, 163, 0.3);
            background-color: #0a0a0a;
        }

        .controls {
            margin-top: 20px;
            color: #888;
        }

        .controls p {
            margin: 5px 0;
        }

        .btn {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 10px 30px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn:hover {
            background: #3db892;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(78, 204, 163, 0.4);
        }

        .btn-secondary {
            background: #3498db;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #2980b9;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px 50px;
            border-radius: 15px;
            border: 2px solid #e74c3c;
            display: none;
            z-index: 10;
        }

        .game-over h2 {
            color: #e74c3c;
            margin-bottom: 15px;
        }

        .game-over p {
            color: #fff;
            margin-bottom: 10px;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        .settings-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            min-width: 250px;
            border: 1px solid rgba(78, 204, 163, 0.3);
        }

        .settings-panel h3 {
            color: #4ecca3;
            margin-bottom: 20px;
            font-size: 1.3em;
            text-align: center;
        }

        .setting-group {
            margin-bottom: 20px;
        }

        .setting-group label {
            display: block;
            color: #fff;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .setting-group select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #4ecca3;
            background: #0a0a0a;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
        }

        .setting-group select:focus {
            outline: none;
            border-color: #3db892;
        }

        .color-preview {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }

        .color-box {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            border: 2px solid #fff;
        }

        .info-text {
            color: #888;
            font-size: 0.85em;
            margin-top: 5px;
        }

        .warning-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            display: none;
            pointer-events: none;
        }

        .warning-text {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #e74c3c;
            font-size: 1.5em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            display: none;
            animation: blink 0.5s infinite;
            z-index: 5;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .start-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            overflow-y: auto;
            padding: 20px;
        }

        .start-menu h2 {
            color: #4ecca3;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .menu-section {
            margin-bottom: 20px;
            width: 100%;
            max-width: 300px;
        }

        .menu-section h3 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .menu-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .menu-btn {
            background: rgba(78, 204, 163, 0.2);
            color: #4ecca3;
            border: 2px solid #4ecca3;
            padding: 10px 20px;
            font-size: 0.95em;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .menu-btn:hover, .menu-btn.selected {
            background: #4ecca3;
            color: #1a1a2e;
        }

        .start-btn {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 15px 50px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .start-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.5);
        }

        .hidden {
            display: none !important;
        }

        .warning-shape-preview {
            position: absolute;
            border: 3px dashed #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            display: none;
            pointer-events: none;
            animation: pulse-border 0.5s infinite;
            z-index: 4;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: #e74c3c; background: rgba(231, 76, 60, 0.1); }
            50% { border-color: #ff6b6b; background: rgba(231, 76, 60, 0.3); }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <h1>🐍 贪吃蛇 增强版</h1>
            <div class="score-board">
                <div>得分: <span class="score" id="score">0</span></div>
                <div>最高分: <span class="high-score" id="highScore">0</span></div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="600" height="600"></canvas>
                <div class="warning-overlay" id="warningOverlay"></div>
                <div class="warning-shape-preview" id="warningShapePreview"></div>
                <div class="warning-text" id="warningText">⚠️ 障碍即将出现!</div>
                
                <div class="start-menu" id="startMenu">
                    <h2>🎮 游戏设置</h2>
                    
                    <div class="menu-section">
                        <h3>📐 地图大小</h3>
                        <div class="menu-options">
                            <button class="menu-btn selected" data-type="size" data-value="small" onclick="selectOption(this)">小 (20x20)</button>
                            <button class="menu-btn" data-type="size" data-value="medium" onclick="selectOption(this)">中 (30x30)</button>
                            <button class="menu-btn" data-type="size" data-value="large" onclick="selectOption(this)">大 (40x40)</button>
                        </div>
                    </div>

                    <div class="menu-section">
                        <h3>🧱 障碍模式</h3>
                        <div class="menu-options">
                            <button class="menu-btn selected" data-type="obstacle" data-value="none" onclick="selectOption(this)">无</button>
                            <button class="menu-btn" data-type="obstacle" data-value="preset" onclick="selectOption(this)">预设地图</button>
                        </div>
                    </div>

                    <button class="start-btn" onclick="startGame()">开始游戏</button>
                </div>

                <div class="game-over" id="gameOver">
                    <h2>游戏结束!</h2>
                    <p>最终得分: <span id="finalScore">0</span></p>
                    <p>本次最高分: <span id="sessionHighScore">0</span></p>
                    <button class="btn" onclick="backToMenu()">返回菜单</button>
                    <button class="btn btn-secondary" onclick="restartGame()">重新开始</button>
                </div>
            </div>
            <div class="controls">
                <p>使用方向键 ↑ ↓ ← → 控制蛇的移动 | 空格键暂停</p>
            </div>
        </div>

        <div class="settings-panel">
            <h3>⚙️ 游戏设置</h3>
            
            <div class="setting-group">
                <label for="difficulty">难度选择</label>
                <select id="difficulty" onchange="changeDifficulty()">
                    <option value="easy">简单 (慢速)</option>
                    <option value="normal" selected>普通 (中速)</option>
                    <option value="hard">困难 (快速)</option>
                    <option value="expert">专家 (极速)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>当前颜色主题</label>
                <div class="color-preview">
                    <div class="color-box" id="snakeColorBox" style="background: #4ecca3;"></div>
                    <span style="color: #fff;">蛇</span>
                    <div class="color-box" id="foodColorBox" style="background: #e74c3c;"></div>
                    <span style="color: #fff;">食物</span>
                </div>
                <p class="info-text">每局游戏随机生成颜色</p>
            </div>

            <div class="setting-group">
                <label for="terrainChange">动态障碍</label>
                <select id="terrainChange">
                    <option value="on" selected>开启</option>
                    <option value="off">关闭</option>
                </select>
                <p class="info-text">游戏中随机出现形状化障碍</p>
            </div>

            <button class="btn" onclick="randomizeColors()" style="width: 100%; margin-top: 10px;">
                🎨 随机换色
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const sessionHighScoreElement = document.getElementById('sessionHighScore');
        const startMenuElement = document.getElementById('startMenu');
        const warningShapePreview = document.getElementById('warningShapePreview');
        const warningText = document.getElementById('warningText');
        const snakeColorBox = document.getElementById('snakeColorBox');
        const foodColorBox = document.getElementById('foodColorBox');

        let gridSize = 20;
        let tileCountX = 30;
        let tileCountY = 30;
        let gameSpeed = 100;
        let gameLoopId = null;

        let score = 0;
        let sessionHighScore = 0;
        let gameRunning = false;
        let gamePaused = false;
        let currentSize = 'medium';
        let currentObstacleMode = 'none';

        let snake = [{ x: 10, y: 10 }];
        let velocity = { x: 0, y: 0 };
        let nextVelocity = { x: 0, y: 0 };

        let food = null;
        let obstacles = [];
        let tempObstacles = [];

        let snakeColor = '#4ecca3';
        let foodColor = '#e74c3c';

        let terrainChangeTimer = null;
        let terrainWarningTimer = null;
        let pendingShape = null;

        const difficulties = {
            easy: { speed: 150, scoreMultiplier: 1 },
            normal: { speed: 100, scoreMultiplier: 1.5 },
            hard: { speed: 60, scoreMultiplier: 2 },
            expert: { speed: 40, scoreMultiplier: 3 }
        };

        const mapSizes = {
            small: { tileCount: 20, canvasSize: 400 },
            medium: { tileCount: 30, canvasSize: 600 },
            large: { tileCount: 40, canvasSize: 800 }
        };

        const presetMaps = [
            {
                name: "十字迷宫",
                getObstacles: (tx, ty) => {
                    const obs = [];
                    const cx = Math.floor(tx / 2);
                    const cy = Math.floor(ty / 2);
                    for (let x = 3; x < tx - 3; x++) {
                        if (x < cx - 2 || x > cx + 2) obs.push({ x, y: cy });
                    }
                    for (let y = 3; y < ty - 3; y++) {
                        if (y < cy - 2 || y > cy + 2) obs.push({ x: cx, y });
                    }
                    return obs;
                }
            },
            {
                name: "四角守卫",
                getObstacles: (tx, ty) => {
                    const obs = [];
                    const size = 3;
                    for (let x = 2; x < 2 + size; x++) {
                        for (let y = 2; y < 2 + size; y++) obs.push({ x, y });
                    }
                    for (let x = tx - 2 - size; x < tx - 2; x++) {
                        for (let y = 2; y < 2 + size; y++) obs.push({ x, y });
                    }
                    for (let x = 2; x < 2 + size; x++) {
                        for (let y = ty - 2 - size; y < ty - 2; y++) obs.push({ x, y });
                    }
                    for (let x = tx - 2 - size; x < tx - 2; x++) {
                        for (let y = ty - 2 - size; y < ty - 2; y++) obs.push({ x, y });
                    }
                    return obs;
                }
            },
            {
                name: "回字迷宫",
                getObstacles: (tx, ty) => {
                    const obs = [];
                    const margin = 4;
                    const innerMargin = 8;
                    for (let x = margin; x < tx - margin; x++) {
                        obs.push({ x, y: margin });
                        obs.push({ x, y: ty - margin - 1 });
                    }
                    for (let y = margin; y < ty - margin; y++) {
                        obs.push({ x: margin, y });
                        obs.push({ x: tx - margin - 1, y });
                    }
                    for (let x = innerMargin; x < tx - innerMargin; x++) {
                        obs.push({ x, y: innerMargin });
                        obs.push({ x, y: ty - innerMargin - 1 });
                    }
                    for (let y = innerMargin; y < ty - innerMargin; y++) {
                        obs.push({ x: innerMargin, y });
                        obs.push({ x: tx - innerMargin - 1, y });
                    }
                    return obs;
                }
            },
            {
                name: "对角防线",
                getObstacles: (tx, ty) => {
                    const obs = [];
                    for (let i = 0; i < Math.min(tx, ty); i++) {
                        if (i > 5 && i < Math.min(tx, ty) - 5) {
                            obs.push({ x: i, y: i });
                            obs.push({ x: i, y: ty - 1 - i });
                        }
                    }
                    return obs;
                }
            },
            {
                name: "中央堡垒",
                getObstacles: (tx, ty) => {
                    const obs = [];
                    const cx = Math.floor(tx / 2);
                    const cy = Math.floor(ty / 2);
                    for (let x = cx - 2; x <= cx + 2; x++) {
                        for (let y = cy - 2; y <= cy + 2; y++) {
                            if ((x === cx - 2 || x === cx + 2 || y === cy - 2 || y === cy + 2) && 
                                !(x === cx && y === cy - 2)) {
                                obs.push({ x, y });
                            }
                        }
                    }
                    return obs;
                }
            }
        ];

        const obstacleShapes = [
            { name: "3x3方块", width: 3, height: 3 },
            { name: "2x2角落", width: 2, height: 2 },
            { name: "3x6横条", width: 6, height: 3 },
            { name: "6x3竖条", width: 3, height: 6 },
            { name: "十字形", width: 3, height: 3, pattern: "cross" },
            { name: "L形", width: 3, height: 3, pattern: "L" }
        ];

        let selectedOptions = {
            size: 'small',
            obstacle: 'none'
        };

        function selectOption(btn) {
            const type = btn.dataset.type;
            const value = btn.dataset.value;
            document.querySelectorAll('.menu-btn[data-type="' + type + '"]').forEach(b => {
                b.classList.remove('selected');
            });
            btn.classList.add('selected');
            selectedOptions[type] = value;
        }

        function getRandomColor() {
            const hue = Math.floor(Math.random() * 360);
            return 'hsl(' + hue + ', 70%, 50%)';
        }

        function randomizeColors() {
            snakeColor = getRandomColor();
            foodColor = getRandomColor();
            updateColorPreview();
            if (!gameRunning) {
                draw();
            }
        }

        function updateColorPreview() {
            snakeColorBox.style.background = snakeColor;
            foodColorBox.style.background = foodColor;
        }

        function changeDifficulty() {
            const difficulty = document.getElementById('difficulty').value;
            gameSpeed = difficulties[difficulty].speed;
            if (gameRunning && !gamePaused) {
                clearInterval(gameLoopId);
                gameLoopId = setInterval(gameLoop, gameSpeed);
            }
        }

        function loadPresetMap() {
            const mapIndex = Math.floor(Math.random() * presetMaps.length);
            const map = presetMaps[mapIndex];
            obstacles = map.getObstacles(tileCountX, tileCountY);
        }

        function isObstacleAt(x, y, includeTemp) {
            includeTemp = includeTemp !== false;
            if (obstacles.some(obs => obs.x === x && obs.y === y)) return true;
            if (includeTemp && tempObstacles.some(obs => obs.x === x && obs.y === y)) return true;
            return false;
        }

        function generateFood() {
            let newFood;
            let attempts = 0;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCountX),
                    y: Math.floor(Math.random() * tileCountY)
                };
                attempts++;
                if (attempts > 1000) return null;
            } while (isSnakeAt(newFood.x, newFood.y) || isObstacleAt(newFood.x, newFood.y));
            return newFood;
        }

        function isSnakeAt(x, y) {
            return snake.some(segment => segment.x === x && segment.y === y);
        }

        function startGame() {
            currentSize = selectedOptions.size;
            currentObstacleMode = selectedOptions.obstacle;
            
            const config = mapSizes[currentSize];
            tileCountX = config.tileCount;
            tileCountY = config.tileCount;
            
            canvas.width = config.canvasSize;
            canvas.height = config.canvasSize;

            startMenuElement.classList.add('hidden');
            initGame();
        }

        function initGame() {
            const startX = Math.floor(tileCountX / 2);
            const startY = Math.floor(tileCountY / 2);
            snake = [{ x: startX, y: startY }];
            velocity = { x: 0, y: 0 };
            nextVelocity = { x: 0, y: 0 };
            score = 0;
            scoreElement.textContent = score;
            gameRunning = true;
            gamePaused = false;
            tempObstacles = [];
            pendingShape = null;

            randomizeColors();

            obstacles = [];
            if (currentObstacleMode === 'preset') {
                loadPresetMap();
            }

            food = generateFood();
            changeDifficulty();
            
            if (document.getElementById('terrainChange').value === 'on') {
                scheduleTerrainChange();
            }

            gameOverElement.style.display = 'none';
            warningShapePreview.style.display = 'none';
            warningText.style.display = 'none';
        }

        function scheduleTerrainChange() {
            const delay = 10000 + Math.random() * 10000;
            terrainChangeTimer = setTimeout(function() {
                prepareTerrainChange();
            }, delay);
        }

        function prepareTerrainChange() {
            if (!gameRunning || gamePaused) {
                scheduleTerrainChange();
                return;
            }

            const shape = obstacleShapes[Math.floor(Math.random() * obstacleShapes.length)];
            let position = findValidShapePosition(shape);
            if (!position) {
                scheduleTerrainChange();
                return;
            }

            pendingShape = {
                shape: shape,
                x: position.x,
                y: position.y
            };

            showShapeWarning(pendingShape);

            terrainWarningTimer = setTimeout(function() {
                applyShapeObstacle(pendingShape);
            }, 3000);
        }

        function findValidShapePosition(shape) {
            const maxAttempts = 50;
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                const x = Math.floor(Math.random() * (tileCountX - shape.width - 2)) + 1;
                const y = Math.floor(Math.random() * (tileCountY - shape.height - 2)) + 1;
                if (isValidShapePosition(x, y, shape)) {
                    return { x: x, y: y };
                }
            }
            return null;
        }

        function isValidShapePosition(x, y, shape) {
            const positions = getShapePositions(x, y, shape);
            for (let i = 0; i < positions.length; i++) {
                const pos = positions[i];
                if (pos.x < 0 || pos.x >= tileCountX || pos.y < 0 || pos.y >= tileCountY) {
                    return false;
                }
                if (isSnakeAt(pos.x, pos.y)) {
                    return false;
                }
                if (isObstacleAt(pos.x, pos.y)) {
                    return false;
                }
            }
            return true;
        }

        function getShapePositions(x, y, shape) {
            const positions = [];
            if (shape.pattern === 'cross') {
                const cx = x + 1;
                const cy = y + 1;
                positions.push({ x: cx, y: cy });
                positions.push({ x: cx - 1, y: cy });
                positions.push({ x: cx + 1, y: cy });
                positions.push({ x: cx, y: cy - 1 });
                positions.push({ x: cx, y: cy + 1 });
            } else if (shape.pattern === 'L') {
                for (let i = 0; i < 3; i++) {
                    positions.push({ x: x, y: y + i });
                }
                positions.push({ x: x + 1, y: y + 2 });
                positions.push({ x: x + 2, y: y + 2 });
            } else {
                for (let dx = 0; dx < shape.width; dx++) {
                    for (let dy = 0; dy < shape.height; dy++) {
                        positions.push({ x: x + dx, y: y + dy });
                    }
                }
            }
            return positions;
        }

        function showShapeWarning(pending) {
            const shape = pending.shape;
            const x = pending.x;
            const y = pending.y;
            
            let width, height;
            if (shape.pattern === 'cross' || shape.pattern === 'L') {
                width = 3 * gridSize;
                height = 3 * gridSize;
            } else {
                width = shape.width * gridSize;
                height = shape.height * gridSize;
            }
            
            warningShapePreview.style.left = (x * gridSize) + 'px';
            warningShapePreview.style.top = (y * gridSize) + 'px';
            warningShapePreview.style.width = width + 'px';
            warningShapePreview.style.height = height + 'px';
            warningShapePreview.style.display = 'block';
            
            warningText.textContent = '⚠️ ' + shape.name + '即将出现!';
            warningText.style.display = 'block';
        }

        function applyShapeObstacle(pending) {
            if (!gameRunning) return;

            warningShapePreview.style.display = 'none';
            warningText.style.display = 'none';

            const shape = pending.shape;
            const x = pending.x;
            const y = pending.y;
            const newObstacles = getShapePositions(x, y, shape);
            
            const validObstacles = [];
            for (let i = 0; i < newObstacles.length; i++) {
                const pos = newObstacles[i];
                if (!isSnakeAt(pos.x, pos.y) && !isObstacleAt(pos.x, pos.y)) {
                    validObstacles.push(pos);
                }
            }
            
            tempObstacles = tempObstacles.concat(validObstacles);

            setTimeout(function() {
                if (gameRunning) {
                    tempObstacles = tempObstacles.filter(function(obs) {
                        return !validObstacles.some(function(vo) {
                            return vo.x === obs.x && vo.y === obs.y;
                        });
                    });
                }
            }, 8000);

            pendingShape = null;
            scheduleTerrainChange();
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCountX; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= tileCountY; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            for (let i = 0; i < obstacles.length; i++) {
                drawObstacle(obstacles[i].x, obstacles[i].y, '#7f8c8d', '#2c3e50');
            }

            for (let i = 0; i < tempObstacles.length; i++) {
                drawObstacle(tempObstacles[i].x, tempObstacles[i].y, '#e67e22', '#d35400');
            }

            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                if (i === 0) {
                    ctx.fillStyle = snakeColor;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = snakeColor;
                } else {
                    ctx.fillStyle = snakeColor;
                    ctx.globalAlpha = Math.max(0.4, 1 - i * 0.05);
                    ctx.shadowBlur = 0;
                }
                
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                ctx.globalAlpha = 1;
                
                if (i === 0) {
                    ctx.fillStyle = '#0a0a0a';
                    ctx.shadowBlur = 0;
                    const eyeSize = 3;
                    
                    if (velocity.x === 1) {
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 12, eyeSize, eyeSize);
                    } else if (velocity.x === -1) {
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 12, eyeSize, eyeSize);
                    } else if (velocity.y === -1) {
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 5, eyeSize, eyeSize);
                    } else {
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 12, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 12, eyeSize, eyeSize);
                    }
                }
            }

            if (food) {
                ctx.fillStyle = foodColor;
                ctx.shadowBlur = 15;
                ctx.shadowColor = foodColor;
                
                ctx.beginPath();
                ctx.arc(
                    food.x * gridSize + gridSize / 2,
                    food.y * gridSize + gridSize / 2,
                    gridSize / 2 - 2,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            if (gamePaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏暂停', canvas.width / 2, canvas.height / 2);
                ctx.font = '20px Arial';
                ctx.fillText('按空格键继续', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        function drawObstacle(x, y, fillColor, strokeColor) {
            ctx.fillStyle = fillColor;
            ctx.fillRect(
                x * gridSize + 1,
                y * gridSize + 1,
                gridSize - 2,
                gridSize - 2
            );
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x * gridSize + 4, y * gridSize + 4);
            ctx.lineTo(x * gridSize + gridSize - 4, y * gridSize + gridSize - 4);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x * gridSize + gridSize - 4, y * gridSize + 4);
            ctx.lineTo(x * gridSize + 4, y * gridSize + gridSize - 4);
            ctx.stroke();
        }

        function update() {
            if (!gameRunning || gamePaused) return;

            velocity = { x: nextVelocity.x, y: nextVelocity.y };

            if (velocity.x === 0 && velocity.y === 0) return;

            const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

            if (head.x < 0 || head.x >= tileCountX || head.y < 0 || head.y >= tileCountY) {
                gameOver();
                return;
            }

            if (isSnakeAt(head.x, head.y)) {
                gameOver();
                return;
            }

            if (isObstacleAt(head.x, head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (food && head.x === food.x && head.y === food.y) {
                const difficulty = document.getElementById('difficulty').value;
                const multiplier = difficulties[difficulty].scoreMultiplier;
                score += Math.floor(10 * multiplier);
                scoreElement.textContent = score;
                
                if (score > sessionHighScore) {
                    sessionHighScore = score;
                    highScoreElement.textContent = sessionHighScore;
                }
                
                food = generateFood();
            } else {
                snake.pop();
            }
        }

        function gameOver() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            sessionHighScoreElement.textContent = sessionHighScore;
            gameOverElement.style.display = 'block';

            if (terrainChangeTimer) {
                clearTimeout(terrainChangeTimer);
            }
            if (terrainWarningTimer) {
                clearTimeout(terrainWarningTimer);
            }
            warningShapePreview.style.display = 'none';
            warningText.style.display = 'none';
        }

        function backToMenu() {
            gameOverElement.style.display = 'none';
            startMenuElement.classList.remove('hidden');
            
            if (terrainChangeTimer) {
                clearTimeout(terrainChangeTimer);
            }
            if (terrainWarningTimer) {
                clearTimeout(terrainWarningTimer);
            }
            warningShapePreview.style.display = 'none';
            warningText.style.display = 'none';
            
            canvas.width = 600;
            canvas.height = 600;
            
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function restartGame() {
            initGame();
        }

        function gameLoop() {
            update();
            draw();
        }

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning) {
                    gamePaused = !gamePaused;
                }
                return;
            }

            if (!gameRunning || gamePaused) return;

            switch(e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    if (velocity.y === 0) {
                        nextVelocity = { x: 0, y: -1 };
                    }
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (velocity.y === 0) {
                        nextVelocity = { x: 0, y: 1 };
                    }
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (velocity.x === 0) {
                        nextVelocity = { x: -1, y: 0 };
                    }
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (velocity.x === 0) {
                        nextVelocity = { x: 1, y: 0 };
                    }
                    break;
            }
        });

        updateColorPreview();
        draw();
    </script>
</body>
</html>
